<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrarion — Login & Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FDFBF7;
    --ink: #1A1A1A;
    --accent-brown: #8B4513;
    --cork: #8B7355;
    --cork-dark: #6B563E;
    --border-light: #E8E4D9;
    --note-yellow: #FFF9A8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background-color: var(--cork);
    background-image: 
      radial-gradient(circle at 15% 25%, rgba(0,0,0,0.12) 1px, transparent 1px),
      radial-gradient(circle at 65% 55%, rgba(0,0,0,0.08) 1px, transparent 1px),
      radial-gradient(circle at 35% 75%, rgba(0,0,0,0.12) 1px, transparent 1px);
    background-size: 28px 28px, 35px 35px, 22px 22px;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== NAVIGATION ===== */
  nav {
    background: var(--ink);
    color: var(--paper);
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid var(--accent-brown);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: 4px;
    font-weight: 900;
  }
  .nav-links {
    display: flex;
    gap: 30px;
    list-style: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .nav-links a {
    color: rgba(253, 251, 247, 0.7);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--paper); }

  /* ===== AUTH CONTAINER ===== */
  .auth-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .auth-card {
    display: flex;
    width: 100%;
    max-width: 900px;
    min-height: 600px;
    background: var(--paper);
    border-radius: 8px;
    box-shadow: 15px 15px 0px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
  }

  /* Push pins holding the card */
  .auth-card::before, .auth-card::after {
    content: '';
    position: absolute;
    top: -10px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    z-index: 10;
  }
  .auth-card::before { left: 30%; background: #D32F2F; } /* Red pin */
  .auth-card::after { right: 30%; background: #1976D2; } /* Blue pin */

  /* ===== LEFT SIDE: LOGIN (The Press Style) ===== */
  .login-side {
    flex: 1;
    background: var(--paper);
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 2px dashed var(--border-light);
    position: relative;
  }
  
  .login-side::after {
    content: '';
    position: absolute;
    right: -10px;
    top: 10%;
    height: 80%;
    width: 20px;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 5px,
      var(--border-light) 5px,
      var(--border-light) 10px
    );
    transform: skewX(-10deg);
  }

  .section-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent-brown);
    margin-bottom: 10px;
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .form-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: #666;
    margin-bottom: 30px;
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    margin-bottom: 8px;
  }

  /* Vintage Input Style */
  .vintage-input {
    width: 100%;
    padding: 12px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    outline: none;
    transition: border-color 0.3s;
  }
  .vintage-input:focus {
    border-bottom-color: var(--accent-brown);
  }
  .vintage-input::placeholder {
    color: #aaa;
    font-style: italic;
  }

  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
  }
  .form-options label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #555;
    cursor: pointer;
  }
  .form-options a {
    color: var(--accent-brown);
    text-decoration: none;
    font-weight: 600;
  }
  .form-options a:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-login {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-login:hover {
    background: var(--accent-brown);
    transform: translateY(-2px);
  }

  /* ===== RIGHT SIDE: SIGN UP (The Board Style) ===== */
  .signup-side {
    flex: 1;
    background: var(--note-yellow);
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.05);
  }

  /* Tape effect at the top */
  .signup-side::before {
    content: '';
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 120px;
    height: 35px;
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(0,0,0,0.1);
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    z-index: 5;
  }

  .signup-side .section-label {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    letter-spacing: 1px;
    color: #555;
    text-transform: none;
  }

  .signup-side .form-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: var(--ink);
    letter-spacing: 1px;
  }

  .signup-side .form-subtitle {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: #444;
    font-style: normal;
  }

  /* Sticky Note Input Style */
  .sticky-input {
    width: 100%;
    padding: 12px 15px;
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.3);
    border: 1px dashed rgba(0,0,0,0.2);
    border-radius: 4px;
    outline: none;
    transition: all 0.3s;
  }
  .sticky-input:focus {
    background: rgba(255, 255, 255, 0.6);
    border-color: var(--ink);
    transform: rotate(-0.5deg);
  }
  .sticky-input::placeholder {
    color: #777;
  }

  .signup-side .form-options {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: #444;
  }
  .signup-side .form-options a {
    color: var(--ink);
    font-weight: 700;
  }

  .btn-signup {
    background: var(--ink);
    color: var(--note-yellow);
    border-radius: 4px;
    font-family: 'Fredoka One', cursive;
    letter-spacing: 1px;
    box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
  }
  .btn-signup:hover {
    background: var(--accent-brown);
    transform: translateY(-2px) rotate(-1deg);
    box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
  }

  /* ===== DIVIDER ===== */
  .divider {
    display: flex;
    align-items: center;
    text-align: center;
    margin: 20px 0;
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: #555;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
  }
  .divider span {
    padding: 0 10px;
  }

  /* ===== GOOGLE BUTTON ===== */
  .google-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px dashed rgba(0,0,0,0.2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
  }
  .google-btn:hover {
    background: rgba(255, 255, 255, 0.9);
    transform: translateY(-2px) rotate(1deg);
    box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
    border-style: solid;
  }
  .google-icon {
    width: 22px;
    height: 22px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 850px) {
    .auth-card {
      flex-direction: column;
      min-height: auto;
    }
    .login-side { border-right: none; border-bottom: 2px dashed var(--border-light); padding: 40px 30px; }
    .signup-side { padding: 40px 30px; }
    .auth-card::before { left: 20%; }
    .auth-card::after { right: 20%; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CONTRARION</div>
  <ul class="nav-links">
    <li><a href="index.html">The Public Square</a></li>
    <li><a href="press.html">The Press</a></li>
    <li><a href="board.html">The Board</a></li>
    <li><a href="arcade.html">The Arcade</a></li>
    <li><a href="login.html" class="active">Login / Sign Up</a></li>
  </ul>
  <div style="font-family: 'Inter'; font-size: 0.85rem; cursor: pointer;" onclick="window.location.href='auth.html'">Login / Sign Up</div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    
    <!-- LEFT: LOGIN -->
    <div class="login-side">
      <div class="section-label">The Press · Vol. I</div>
      <h2 class="form-title">Welcome Back.</h2>
      <p class="form-subtitle">The headlines have been waiting for you.</p>
      
      <form action="login-welcome.html">
        <div class="form-group">
          <label for="login-email">Email or Username</label>
          <input type="text" id="login-email" class="vintage-input" placeholder="editor@contrarion.com" required>
        </div>
        
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="vintage-input" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn btn-login">Sign In &rarr;</button>
      </form>
    </div>

    <!-- RIGHT: SIGN UP -->
    <div class="signup-side">
      <div class="section-label">📌 Pin your truth</div>
      <h2 class="form-title">Join the Square!</h2>
      <p class="form-subtitle">Got a hot take? We need your voice.</p>
      
      <form action="signup-profile.html">
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" class="sticky-input" placeholder="@your_handle" required>
        </div>
        
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" class="sticky-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="sticky-input" placeholder="make it strong!" required>
        </div>

        <div class="form-options">
          <label><input type="checkbox" required> I agree to the <a href="#">House Rules</a></label>
        </div>

        <button type="submit" class="submit-btn btn-signup">Pin Me Up! 📌</button>
      </form>

      <!-- Divider -->
      <div class="divider"><span>or skip the form</span></div>

      <!-- Google Sign Up Button -->
      <button type="button" class="google-btn" onclick="window.location.href='signup-profile.html'">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>

    </div>

  </div>
</div>

</body>
</html>
